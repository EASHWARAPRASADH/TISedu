version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: erpv2_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - ./docker/php.ini:/usr/local/etc/php/conf.d/custom.ini
    networks:
      - erpv2_network
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.0
    container_name: erpv2_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: infixedu
      MYSQL_ROOT_PASSWORD: root
      MYSQL_PASSWORD: root
      MYSQL_ALLOW_EMPTY_PASSWORD: 'no'
    ports:
      - "33066:3306" # Use non-standard port for host
    volumes:
      - mysql_data:/var/lib/mysql
      - ./local_infixedu_dump.sql:/docker-entrypoint-initdb.d/01-database.sql
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost", "-u", "root", "-proot"]
      timeout: 20s
      retries: 10
    networks:
      - erpv2_network

  nginx:
    image: nginx:alpine
    container_name: erpv2_nginx
    restart: unless-stopped
    ports:
      - "8888:80" # Non-common port as requested
    volumes:
      - ./:/var/www:ro
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - erpv2_network
    depends_on:
      - app

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: erpv2_phpmyadmin
    restart: unless-stopped
    ports:
      - "8881:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root
    networks:
      - erpv2_network
    depends_on:
      - mysql

networks:
  erpv2_network:
    driver: bridge

volumes:
  mysql_data:
